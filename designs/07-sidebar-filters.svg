  <text x="130" y="31" fill="#4B5563" font-size="12">|</text>
  <text x="142" y="31" fill="#D1D5DB" font-size="12">Candidates</text>
  <text x="600" y="31" fill="#9CA3AF" font-size="12">Dashboard</text>
