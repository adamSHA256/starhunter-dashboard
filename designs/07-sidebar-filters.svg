<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <title>Layout 7: Sidebar Filters - Left filter facets + main card grid, real data</title>
  <defs>
    <filter id="shadow7" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#F9FAFB"/>

  <!-- Header -->
