  <rect x="20" y="119" width="14" height="14" rx="3" fill="#4B5563"/>
  <text x="44" y="167" fill="#9CA3AF" font-size="13">Jobs</text>
  <rect x="20" y="155" width="14" height="14" rx="3" fill="#4B5563"/>
