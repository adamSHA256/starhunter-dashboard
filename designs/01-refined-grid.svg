  <line x1="120" y1="18" x2="120" y2="38" stroke="#4B5563" stroke-width="1"/>
  <text x="130" y="33" fill="#9CA3AF" font-size="13">Candidates</text>

  <!-- Header search bar -->
  <rect x="300" y="12" width="500" height="32" rx="8" fill="#374151"/>
  <text x="320" y="33" fill="#6B7280" font-size="12">Kandidaten suchen...</text>
  <circle cx="780" cy="28" r="6" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="784" y1="32" x2="788" y2="36" stroke="#6B7280" stroke-width="1.5"/>

  <circle cx="1400" cy="28" r="16" fill="#374151"/>
