server {
    listen 80;
    server_name your-domain.com;

    root /var/www/starhunter-dashboard/dist;
    index index.html;

    # SPA: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy GraphQL API — injects the Bearer token so it never reaches the browser
    location /api/graphql {
        proxy_pass https://release-current.starhunter.software/Api/graphql;
        proxy_set_header Authorization "Bearer YOUR_TOKEN_HERE";
        proxy_set_header Content-Type "application/json";
        proxy_set_header Host release-current.starhunter.software;
        proxy_ssl_server_name on;
    }

    # Proxy avatar/upload assets from the API server
    location /_uploads/ {
        proxy_pass https://release-current.starhunter.software/_uploads/;
        proxy_set_header Host release-current.starhunter.software;
        proxy_ssl_server_name on;
    }
}
